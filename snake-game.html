<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: white;
            font-size: 1.2em;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .info-item {
            font-weight: bold;
        }

        .score {
            color: #4ecca3;
        }

        .high-score {
            color: #ffd700;
        }

        canvas {
            border: 3px solid white;
            background-color: #1a1a2e;
            display: block;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .controls {
            color: white;
            margin-top: 20px;
            font-size: 1em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #4ecca3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #3db892;
        }

        button:active {
            transform: scale(0.98);
        }

        .instructions {
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .game-over {
            color: #ff6b6b;
            font-weight: bold;
            margin-top: 15px;
            font-size: 1.3em;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 Snake Game</h1>
        
        <div class="game-info">
            <div class="info-item">Score: <span class="score" id="score">0</span></div>
            <div class="info-item">High Score: <span class="high-score" id="highScore">0</span></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <p id="statusText">Press START or use arrow keys to play</p>
            <div class="button-group">
                <button onclick="startGame()">START</button>
                <button onclick="pauseGame()">PAUSE</button>
                <button onclick="resetGame()">RESET</button>
            </div>
        </div>

        <div class="instructions">
            <p><strong>How to Play:</strong></p>
            <p>🎮 Use Arrow Keys or WASD to move the snake</p>
            <p>🍎 Eat the red food to grow and gain points</p>
            <p>⚠️ Don't hit the walls or yourself</p>
            <p>🏆 Try to beat your high score!</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
