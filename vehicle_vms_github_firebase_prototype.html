<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gate VMS Prototype</title><style>body{font-family:Arial;background:#eef2f7;margin:0;padding:16px}.wrap{max-width:960px;margin:auto;background:#fff;padding:18px;border-radius:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,button,select{padding:12px;width:100%;box-sizing:border-box}video,img{width:100%;border-radius:10px;background:#ddd;max-height:320px}table{width:100%;border-collapse:collapse;margin-top:16px}td,th{border:1px solid #ddd;padding:8px}</style></head><body><div class=wrap><h2>Vehicle Gate VMS – Prototype</h2><video id=v autoplay playsinline></video><canvas id=c hidden></canvas><img id=p hidden><div class=grid><button onclick=capture()>Capture Vehicle</button><button onclick=ocr()>Detect Number Plate</button></div><div class=grid><input id=plate placeholder='Vehicle Number'><input id=driver placeholder='Driver Name'></div><input id=purpose placeholder='Purpose'><div class=grid><button onclick="save('IN')">Vehicle IN</button><button onclick="save('OUT')">Vehicle OUT</button></div><div id=s></div><table><thead><tr><th>Vehicle</th><th>Type</th><th>Time</th></tr></thead><tbody id=log></tbody></table></div><script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script><script type='module'>import{initializeApp}from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js';import{getFirestore,collection,addDoc,serverTimestamp} from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js';import{getStorage,ref,uploadString,getDownloadURL} from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-storage.js';const firebaseConfig={apiKey:'REPLACE',authDomain:'REPLACE',projectId:'REPLACE',storageBucket:'REPLACE',appId:'REPLACE'};let db,st;try{const app=initializeApp(firebaseConfig);db=getFirestore(app);st=getStorage(app);}catch(e){}navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(x=>v.srcObject=x);let img='';window.capture=()=>{c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);img=c.toDataURL('image/jpeg',0.9);p.src=img;p.hidden=false;s.innerHTML='Captured'};window.ocr=async()=>{if(!img)return; s.innerHTML='Reading plate...'; let r=await Tesseract.recognize(img,'eng'); plate.value=(r.data.text||'').replace(/[^A-Z0-9]/gi,'').toUpperCase(); s.innerHTML='Plate detected';};window.save=async(type)=>{let rec={vehicle:plate.value,driver:driver.value,purpose:purpose.value,movement:type,time:new Date().toLocaleString()};if(st&&img){let rr=ref(st,'vehicle/'+Date.now()+'.jpg');await uploadString(rr,img,'data_url');rec.image=await getDownloadURL(rr);}if(db){rec.createdAt=serverTimestamp();await addDoc(collection(db,'vehicle_log'),rec);}log.innerHTML='<tr><td>'+rec.vehicle+'</td><td>'+type+'</td><td>'+rec.time+'</td></tr>'+log.innerHTML;s.innerHTML='Saved';};</script></body></html>
